name: CI

"on":
  push:
    branches:
      - main
  pull_request:

jobs:
  ios:
    name: Swift packages and iOS build
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select newest installed Xcode
        shell: bash
        run: |
          set -euo pipefail
          selected="$(python3 - <<'PY'
          import glob
          import os
          import re
          import sys

          candidates = glob.glob('/Applications/Xcode_26*.app') or glob.glob('/Applications/Xcode*.app')
          if not candidates:
              print('No Xcode installation found under /Applications', file=sys.stderr)
              raise SystemExit(1)

          def version_key(path: str) -> tuple[int, ...]:
              return tuple(int(part) for part in re.findall(r'\d+', os.path.basename(path)))

          print(sorted(candidates, key=version_key)[-1])
          PY
          )"
          sudo xcode-select -s "$selected/Contents/Developer"
          xcodebuild -version
          xcodebuild -showsdks

      - name: Test SimmerSmithCloudKit
        timeout-minutes: 15
        run: swift test --package-path SimmerSmithCloudKit

      - name: Test SimmerSmithKit
        timeout-minutes: 15
        run: swift test --package-path SimmerSmithKit

      - name: Install xcodegen
        timeout-minutes: 10
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: SimmerSmith
        run: xcodegen generate

      - name: Build iOS app
        timeout-minutes: 30
        working-directory: SimmerSmith
        run: xcodebuild build -project SimmerSmith.xcodeproj -scheme SimmerSmith -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO

      - name: Create app-target test simulator
        timeout-minutes: 10
        run: bash scripts/dev-sim.sh

      # simmersmith-z69.3: run the app-target unit tests (SimmerSmithTests) headlessly.
      # These construct a live CKContainer (via HouseholdSession), so they REQUIRE the iCloud
      # entitlement to be embedded — which means signing must stay ALLOWED. The trap
      # (bd memory `app-target-tests`): `CODE_SIGNING_ALLOWED=NO` strips the entitlement,
      # CKContainer refuses to init, the host dies at launch, and xcodebuild prints a bare
      # `** TEST FAILED **` with no test-level error. A stock GitHub runner has no Apple
      # team/cert, so the fix is ad-hoc signing: `CODE_SIGN_IDENTITY=-` ("Sign to Run
      # Locally") embeds the entitlement without a cert or profile. Proven locally to run 90
      # tests green AND to exit nonzero on a deliberately broken test (a real gate, not a
      # vacuous pass). No iCloud account is present, so sync degrades to "Not Authenticated"
      # — non-fatal; the tests assert policy/logic, not live sync. Do NOT "simplify" this to
      # CODE_SIGNING_ALLOWED=NO.
      - name: Test SimmerSmith app target
        timeout-minutes: 30
        run: |
          xcodebuild test \
            -project SimmerSmith/SimmerSmith.xcodeproj -scheme SimmerSmith \
            -destination 'platform=iOS Simulator,name=SimmerSmithSim' \
            -only-testing:SimmerSmithTests \
            CODE_SIGNING_ALLOWED=YES CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=- \
            CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM="" PROVISIONING_PROFILE_SPECIFIER=""
