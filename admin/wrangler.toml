name = "simmersmith"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_als"]

# Disable the default *.workers.dev route. Auth for this portal is
# Cloudflare Access bound to the custom hostname (admin.simmersmith.app)
# only — the Worker itself performs no in-app authentication. Leaving
# workers_dev enabled would publish the full admin portal at
# simmersmith.<account>.workers.dev, which Access does NOT cover, so
# anyone who guesses that URL would reach every admin view + mutation.
workers_dev = false

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

# SIMMERSMITH_ADMIN_TOKEN is set as a Worker secret via
# `wrangler secret put SIMMERSMITH_ADMIN_TOKEN` so the bearer token
# the SvelteKit server-side fetchers use never ships in the bundle.
# The same token must match SIMMERSMITH_API_TOKEN on the FastAPI
# backend (Fly).

[vars]
SIMMERSMITH_API_BASE = "https://simmersmith.fly.dev"
