name: SimmerSmith
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
packages:
  SimmerSmithKit:
    path: ../SimmerSmithKit
targets:
  SimmerSmith:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: SimmerSmith
    dependencies:
      - package: SimmerSmithKit
    settings:
      base:
        DEVELOPMENT_TEAM: K7CBQW6MPG
        PRODUCT_BUNDLE_IDENTIFIER: app.simmersmith.ios
        PRODUCT_NAME: SimmerSmith
        CODE_SIGN_ENTITLEMENTS: SimmerSmith/SimmerSmith.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: SimmerSmith/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: 1.0
  SimmerSmithTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: SimmerSmithTests
    dependencies:
      - target: SimmerSmith
      - package: SimmerSmithKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.simmersmith.ios.tests
        GENERATE_INFOPLIST_FILE: YES
  SimmerSmithUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: SimmerSmithUITests
    dependencies:
      - target: SimmerSmith
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.simmersmith.ios.uitests
        GENERATE_INFOPLIST_FILE: YES
