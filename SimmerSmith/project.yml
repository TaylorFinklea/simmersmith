name: SimmerSmith
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
packages:
  SimmerSmithKit:
    path: ../SimmerSmithKit
  SimmerSmithCloudKit:
    path: ../SimmerSmithCloudKit
targets:
  SimmerSmith:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: SimmerSmith
        excludes:
          - PrivacyInfo.xcprivacy
      - path: SimmerSmith/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - package: SimmerSmithKit
      - package: SimmerSmithCloudKit
        product: CloudKitProvisioning

      - package: SimmerSmithCloudKit
        product: HouseholdSync
      - package: SimmerSmithCloudKit
        product: HouseholdRecords
      - package: SimmerSmithCloudKit
        product: AIProviderKit
    settings:
      base:
        DEVELOPMENT_TEAM: K7CBQW6MPG
        PRODUCT_BUNDLE_IDENTIFIER: app.simmersmith.ios
        PRODUCT_NAME: SimmerSmith
        # iCloud/CloudKit entitlement in BOTH configs now: the CloudKit-checks panel is reachable in
        # TestFlight (gated on DEBUG || isTestFlight), so Release needs CloudKit at runtime to test
        # the SP-A work on-device. The distribution archive uses AUTOMATIC signing (ExportOptions) so
        # Xcode regenerates the App Store profile WITH iCloud — manual signing's named profile lacked
        # it (build 108 had to strip iCloud from Release; build 109 puts it back via automatic signing).
        CODE_SIGN_ENTITLEMENTS: SimmerSmith/SimmerSmith.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: SimmerSmith/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        CURRENT_PROJECT_VERSION: 159
        MARKETING_VERSION: 1.0.0
      configs:
        # aps-environment must match the build's distribution: Debug (Xcode run) → the APNs
        # development gateway; Release (TestFlight/App Store) → production. The entitlements
        # file references $(SM_APS_ENVIRONMENT). Without production APNs a TestFlight build's
        # CloudKit silent pushes don't arrive, so shared-zone edits sync only on foreground.
        Debug:
          SM_APS_ENVIRONMENT: development
        Release:
          SM_APS_ENVIRONMENT: production
  SimmerSmithTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: SimmerSmithTests
    dependencies:
      - target: SimmerSmith
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.simmersmith.ios.tests
        GENERATE_INFOPLIST_FILE: YES
  SimmerSmithUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: SimmerSmithUITests
    dependencies:
      - target: SimmerSmith
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.simmersmith.ios.uitests
        GENERATE_INFOPLIST_FILE: YES
