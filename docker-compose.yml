services:
  simmersmith:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      SIMMERSMITH_HOST: ${SIMMERSMITH_HOST:-0.0.0.0}
      SIMMERSMITH_PORT: ${SIMMERSMITH_PORT:-8080}
      SIMMERSMITH_DATA_DIR: ${SIMMERSMITH_DATA_DIR:-/app/data}
      SIMMERSMITH_DB_PATH: ${SIMMERSMITH_DB_PATH:-/app/data/meals.db}
      SIMMERSMITH_BASE_URL: ${SIMMERSMITH_BASE_URL:-http://localhost:8080}
    volumes:
      - /Users/tfinklea/codex/meals/data:/app/data
